<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataLayer Evaluator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4aa;
    --accent2: #0ea5e9;
    --warn: #f59e0b;
    --danger: #ef4444;
    --success: #22c55e;
    --text: #e2e8f0;
    --muted: #64748b;
    --mandatory: #ef4444;
    --high: #f97316;
    --medium: #f59e0b;
    --low: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 560px;
    min-height: 500px;
    max-height: 700px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #071220 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: #000;
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  .header-title {
    line-height: 1.2;
  }

  .header-title h1 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .header-title p {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-scan {
    background: linear-gradient(135deg, var(--accent), #00b896);
    color: #000;
    border: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-scan:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-scan:active { transform: translateY(0); }
  .btn-scan.loading { opacity: 0.7; cursor: not-allowed; }

  .btn-icon {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--accent); }

  /* SCORE BAR */
  .score-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .score-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0%, var(--surface2) 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    transition: background 0.5s;
  }

  .score-circle::before {
    content: '';
    position: absolute;
    width: 36px;
    height: 36px;
    background: var(--surface);
    border-radius: 50%;
  }

  .score-num {
    position: relative;
    z-index: 1;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .score-info { flex: 1; }
  .score-label { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .score-detail { font-size: 10px; color: var(--muted); }

  .score-pills {
    display: flex;
    gap: 6px;
  }

  .pill {
    padding: 3px 8px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 600;
    font-family: 'Space Mono', monospace;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .pill.pass { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
  .pill.warn { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }
  .pill.fail { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 16px;
    gap: 2px;
  }

  .tab {
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-badge {
    background: var(--surface2);
    color: var(--muted);
    padding: 1px 5px;
    border-radius: 99px;
    font-size: 9px;
    font-family: 'Space Mono', monospace;
  }

  .tab.active .tab-badge { background: rgba(0,212,170,0.2); color: var(--accent); }

  /* CONTENT AREA */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* PAGE TYPE BADGE */
  .page-context {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
  }

  .page-context .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--accent2);
  }

  .page-context .label { color: var(--muted); }
  .page-context .value { color: var(--accent2); font-weight: 600; margin-left: auto; font-family: 'Space Mono', monospace; font-size: 10px; }

  /* CHECK GROUPS */
  .check-group {
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .check-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .check-group-header:hover { background: #1e2d40; }

  .check-group-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
  }

  .group-icon {
    font-size: 14px;
  }

  .group-score {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .group-chevron {
    color: var(--muted);
    font-size: 10px;
    transition: transform 0.2s;
  }

  .check-group.collapsed .group-chevron { transform: rotate(-90deg); }
  .check-group.collapsed .check-list { display: none; }

  /* CHECK ITEMS */
  .check-list { padding: 4px 0; }

  .check-item {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    align-items: start;
    gap: 8px;
    padding: 7px 12px;
    border-top: 1px solid rgba(30,45,69,0.5);
    transition: background 0.15s;
  }

  .check-item:hover { background: rgba(255,255,255,0.02); }

  .check-status {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .check-status.pass { background: rgba(34,197,94,0.2); color: var(--success); border: 1px solid rgba(34,197,94,0.4); }
  .check-status.fail { background: rgba(239,68,68,0.2); color: var(--danger); border: 1px solid rgba(239,68,68,0.4); }
  .check-status.warn { background: rgba(245,158,11,0.2); color: var(--warn); border: 1px solid rgba(245,158,11,0.4); }
  .check-status.info { background: rgba(14,165,233,0.2); color: var(--accent2); border: 1px solid rgba(14,165,233,0.4); }

  .check-body { min-width: 0; }

  .check-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
    line-height: 1.3;
  }

  .check-path {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .check-found {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .check-found.value { background: rgba(0,212,170,0.1); color: var(--accent); border: 1px solid rgba(0,212,170,0.2); }
  .check-found.missing { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
  .check-found.wrong-type { background: rgba(245,158,11,0.1); color: #fde68a; border: 1px solid rgba(245,158,11,0.2); }

  .importance-badge {
    font-size: 8px;
    font-family: 'Space Mono', monospace;
    padding: 2px 5px;
    border-radius: 99px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .imp-mandatory { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  .imp-high { background: rgba(249,115,22,0.15); color: #fdba74; border: 1px solid rgba(249,115,22,0.3); }
  .imp-medium { background: rgba(245,158,11,0.15); color: #fde68a; border: 1px solid rgba(245,158,11,0.3); }
  .imp-low { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }

  /* EVENTS TAB */
  .event-entry {
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .event-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    background: var(--surface2);
    cursor: pointer;
  }

  .event-name-wrap { display: flex; align-items: center; gap: 6px; }

  .event-type-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .event-type-tag.ecommerce { background: rgba(0,212,170,0.2); color: var(--accent); }
  .event-type-tag.custom { background: rgba(14,165,233,0.2); color: var(--accent2); }
  .event-type-tag.pageview { background: rgba(168,85,247,0.2); color: #c084fc; }
  .event-type-tag.other { background: rgba(100,116,139,0.2); color: var(--muted); }

  .event-name { font-size: 11px; font-weight: 600; }
  .event-ts { font-size: 9px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .event-body { padding: 8px 10px; background: var(--bg); display: none; }
  .event-entry.expanded .event-body { display: block; }

  .json-tree {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    line-height: 1.6;
    color: #94a3b8;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 160px;
    overflow-y: auto;
  }

  .json-key { color: #7dd3fc; }
  .json-string { color: #86efac; }
  .json-number { color: #fca5a5; }
  .json-bool { color: #c084fc; }
  .json-null { color: var(--muted); }

  /* GA4 TAB */
  .ga4-section { margin-bottom: 12px; }

  .ga4-event-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .ga4-event-card-header {
    padding: 8px 12px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ga4-event-name { font-size: 11px; font-weight: 600; font-family: 'Space Mono', monospace; color: var(--accent); }
  .ga4-status { font-size: 10px; display: flex; align-items: center; gap: 4px; }

  .ga4-params { padding: 6px 12px; }

  .ga4-param-row {
    display: grid;
    grid-template-columns: 150px 1fr 60px;
    gap: 6px;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    font-size: 10px;
  }

  .ga4-param-row:last-child { border-bottom: none; }

  .ga4-param-name { font-family: 'Space Mono', monospace; color: var(--muted); }
  .ga4-param-value { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ga4-param-status { text-align: right; }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
    gap: 10px;
  }

  .empty-icon { font-size: 36px; opacity: 0.3; }
  .empty-title { font-size: 13px; font-weight: 600; color: var(--muted); }
  .empty-sub { font-size: 11px; color: var(--muted); opacity: 0.7; max-width: 260px; line-height: 1.5; }

  /* FOOTER */
  .footer {
    border-top: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .footer-url {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 350px;
  }

  .footer-brand { font-size: 9px; color: var(--muted); opacity: 0.5; }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { 
    width: 14px; height: 14px; 
    border: 2px solid var(--border); 
    border-top-color: var(--accent); 
    border-radius: 50%; 
    animation: spin 0.7s linear infinite; 
    display: inline-block;
  }

  /* Pulse dot */
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .live-dot { 
    width: 6px; height: 6px; border-radius: 50%; 
    background: var(--success); 
    animation: pulse 2s ease-in-out infinite;
    display: inline-block;
  }

  /* Tooltip */
  [data-tip] { position: relative; cursor: help; }
  [data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e2d45;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    font-family: 'DM Sans', sans-serif;
  }

  .filter-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 3px 8px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active { background: rgba(0,212,170,0.15); color: var(--accent); border-color: rgba(0,212,170,0.4); }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Fallback card — field derivable from URL */
  .fallback-card {
    margin-top: 4px;
    padding: 6px 8px;
    border-radius: 6px;
    background: rgba(245,158,11,0.07);
    border: 1px solid rgba(245,158,11,0.28);
    border-left: 3px solid #f59e0b;
  }

  .fallback-header {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 5px;
  }

  .fallback-badge {
    font-size: 8px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(245,158,11,0.2);
    color: #fbbf24;
    border: 1px solid rgba(245,158,11,0.4);
  }

  .fallback-source {
    font-size: 9px;
    color: #fde68a;
    font-weight: 500;
  }

  .fallback-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
  }

  .fallback-row-label {
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    min-width: 28px;
    flex-shrink: 0;
  }

  .fallback-value {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: #fde68a;
    background: rgba(245,158,11,0.12);
    padding: 1px 6px;
    border-radius: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
  }

  .fallback-gtm {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: #94a3b8;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
  }

  .fallback-param-tag {
    font-family: 'Space Mono', monospace;
    background: rgba(0,212,170,0.12);
    color: var(--accent);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-mark">DL</div>
    <div class="header-title">
      <h1>DataLayer Evaluator</h1>
      <p>Mapp Intelligence · Retail GTM</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="btnRefresh" title="Re-scan page">⟳</button>
    <button class="btn-icon" id="btnExport" title="Export report as JSON">↓</button>
    <button class="btn-scan" id="btnScan">▶ Scan Page</button>
  </div>
</div>

<div class="score-bar" id="scoreBar" style="display:none">
  <div class="score-circle" id="scoreCircle">
    <span class="score-num" id="scoreNum">0%</span>
  </div>
  <div class="score-info">
    <div class="score-label" id="scoreLabel">Evaluating...</div>
    <div class="score-detail" id="scoreDetail"></div>
  </div>
  <div class="score-pills" id="scorePills"></div>
</div>

<div class="tabs" id="tabsBar" style="display:none">
  <div class="tab active" data-tab="checks">
    <span>Checks</span>
    <span class="tab-badge" id="badgeChecks">0</span>
  </div>
  <div class="tab" data-tab="events">
    <span>Events</span>
    <span class="tab-badge" id="badgeEvents">0</span>
  </div>
  <div class="tab" data-tab="ga4">
    <span>GA4 Events</span>
    <span class="tab-badge" id="badgeGA4">0</span>
  </div>
  <div class="tab" data-tab="raw">
    <span>Raw DL</span>
    <span class="tab-badge" id="badgeRaw">0</span>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="empty-state">
    <div class="empty-icon">◉</div>
    <div class="empty-title">Ready to scan</div>
    <div class="empty-sub">Click "Scan Page" to evaluate the dataLayer against Mapp Intelligence retail tracking requirements</div>
  </div>
</div>

<div class="footer">
  <span class="footer-url" id="footerUrl">—</span>
  <span class="footer-brand">Mapp Intelligence Evaluator v1.0</span>
</div>

<script src="popup.js"></script>
</body>
</html>
